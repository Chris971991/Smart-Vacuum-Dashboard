                            mushroom-card .title {
                              font-size: 12px !important;
                            }
                      - type: custom:mushroom-template-card
                        primary: More
                        icon: mdi:dots-horizontal
                        secondary: |
                          {% set rooms = [
                            is_state('input_boolean.schedule_room_laundry', 'on'),
                            is_state('input_boolean.schedule_room_master_robe', 'on')
                          ] | select('eq', true) | list | count %}
                          {{ rooms }} selected
                        tap_action:
                          action: call-service
                          service: input_boolean.toggle
                          data:
                            entity_id: >
                              input_boolean.schedule_room_laundry,
                              input_boolean.schedule_room_master_robe
                        card_mod:
                          style: |
                            ha-card {
                              padding: 8px !important;
                              background: rgba(var(--rgb-primary-color), 0.05) !important;
                            }
                            mushroom-card .title {
                              font-size: 12px !important;
                            }
      - attributes:
          label: Settings
          icon: mdi:cog
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-select-card
              entity: input_select.alfonso_fan_speed_selector
              name: Fan Speed
              icon: mdi:fan
            - type: custom:mushroom-select-card
              entity: select.alfonso_work_mode
              name: Work Mode
              icon: mdi:briefcase
            - type: custom:mushroom-select-card
              entity: select.alfonso_water_flow_level
              name: Water Flow
              icon: mdi:water
            - type: custom:mushroom-number-card
              entity: number.alfonso_volume
              name: Volume
              icon: mdi:volume-high
            - type: entities
              title: Features
              entities:
                - entity: switch.alfonso_continuous_cleaning
                  name: Continuous
                - entity: switch.alfonso_carpet_auto_boost_suction
                  name: Carpet Boost
                - entity: switch.alfonso_true_detect
                  name: True Detect
                - entity: switch.alfonso_advanced_mode
                  name: Advanced
                - entity: switch.alfonso_clean_preference
                  name: Clean Preference
              card_mod:
                style: |
                  ha-card { 
                    margin-top: 8px;
                  }
      - attributes:
          label: Maintenance
          icon: mdi:wrench
          id: maintenance
        card:
          type: vertical-stack
          cards:
            - type: custom:bar-card
              entities:
                - entity: sensor.alfonso_filter_lifespan
                  name: Filter
                  icon: mdi:air-filter
                  tap_action:
                    action: call-service
                    service: button.press
                    service_data:
                      entity_id: button.alfonso_reset_filter_lifespan
                - entity: sensor.alfonso_main_brush_lifespan
                  name: Main Brush
                  icon: mdi:brush
                  tap_action:
                    action: call-service
                    service: button.press
                    service_data:
                      entity_id: button.alfonso_reset_main_brush_lifespan
                - entity: sensor.alfonso_side_brush_lifespan
                  name: Side Brush
                  icon: mdi:brush-variant
                  tap_action:
                    action: call-service
                    service: button.press
                    service_data:
                      entity_id: button.alfonso_reset_side_brush_lifespan
              positions:
                icon: inside
                name: inside
                value: inside
              severity:
                - color: "#00ff00"
                  from: 60
                  to: 100
                - color: "#ffaa00"
                  from: 20
                  to: 59
                - color: "#ff0000"
                  from: 0
                  to: 19
              height: 40px
              stack: vertical
              card_mod:
                style: |
                  ha-card { 
                    padding: 12px;
                    border-radius: 12px;
                  }
                  bar-card-row {
                    margin-bottom: 8px !important;
                  }
                  bar-card-row:last-child {
                    margin-bottom: 0px !important;
                  }
                  bar-card-name {
                    font-weight: 500;
                  }
            - type: custom:stack-in-card
              cards:
                - type: custom:mushroom-template-card
                  primary: Lifetime Statistics
                  icon: mdi:chart-box
                  icon_color: blue
                - type: glance
                  entities:
                    - entity: sensor.alfonso_total_cleanings
                      name: Total Cleans
                      icon: mdi:counter
                    - entity: sensor.alfonso_total_area_cleaned
                      name: Total Area
                      icon: mdi:texture-box
                    - entity: sensor.alfonso_total_cleaning_duration
                      name: Total Time
                      icon: mdi:timer
                  show_state: true
                  card_mod:
                    style: |
                      ha-card {
                        box-shadow: none !important;
                        background: none !important;
                        padding: 0 16px 16px 16px !important;
                      }
              card_mod:
                style: |
                  ha-card {
                    margin-top: 8px;
                  }
            - type: custom:mushroom-template-card
              primary: Average Performance
              secondary: >
                {% set total_cleans = states('sensor.alfonso_total_cleanings') |
                int %} {% set total_area =
                states('sensor.alfonso_total_area_cleaned') | float %} {% set
                total_time = states('sensor.alfonso_total_cleaning_duration') |
                float %} {% if total_cleans > 0 %}
                  {{ (total_area / total_cleans) | round(0) }} m² per clean | {{ (total_time / total_cleans) | round(0) }} min per clean
                {% else %}
                  No cleaning data yet
                {% endif %}
              icon: mdi:calculator
              icon_color: purple
              multiline_secondary: true
              card_mod:
                style: |
                  ha-card {
                    margin-top: 8px;
                  }
            - type: custom:mushroom-template-card
              primary: >
                {% set error_description = state_attr('sensor.alfonso_error',
                'description') %} {% if error_description == "NoError: Robot is
                operational" or states('sensor.alfonso_error') == 'NoError:
                Robot is operational' %}
                  Status
                {% else %}
                  Error
                {% endif %}
              secondary: >
                {% set error_description = state_attr('sensor.alfonso_error',
                'description') %} {% if error_description == "NoError: Robot is
                operational" or states('sensor.alfonso_error') == 'NoError:
                Robot is operational' %}
                  Robot is operational
                {% else %}
                  {% set error_text = error_description.split(': ')[1] if ': ' in error_description else error_description %}
                  {% set formatted_error = error_text.replace('FreshWaterBox', 'Fresh Water Box')
                                                    .replace('DustBin', 'Dust Bin')
                                                    .replace('MainBrush', 'Main Brush')
                                                    .replace('SideBrush', 'Side Brush')
                                                    .replace('CleaningPad', 'Cleaning Pad')
                                                    .replace('WaterTank', 'Water Tank') %}
                  {{ formatted_error }}
                {% endif %}
              icon: >
                {% set error_description = state_attr('sensor.alfonso_error',
                'description') %} {% if error_description == "NoError: Robot is
                operational" or states('sensor.alfonso_error') == 'NoError:
                Robot is operational' %}
                  mdi:check-circle
                {% else %}
                  mdi:alert-circle
                {% endif %}
              icon_color: >
                {% set error_description = state_attr('sensor.alfonso_error',
                'description') %} {% if error_description == "NoError: Robot is
                operational" or states('sensor.alfonso_error') == 'NoError:
                Robot is operational' %}
                  green
                {% else %}
                  red
                {% endif %}
              tap_action:
                action: more-info
              entity: sensor.alfonso_error
              card_mod:
                style: |
                  ha-card { margin-top: 8px; }
