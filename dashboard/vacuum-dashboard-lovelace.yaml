      - attributes:
          label: Schedule
          icon: mdi:calendar-clock
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Weekly Cleaning Schedule
              card_mod:
                style: |
                  ha-card {
                    padding-top: 8px !important;
                  }
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-template-card
                  primary: Monday
                  secondary: >
                    {% set normal_time =
                    states('input_datetime.vacuum_schedule_time') %} {% set
                    nightshift_time =
                    states('input_datetime.vacuum_schedule_time_nightshift') %}
                    {% set time = normal_time if
                    is_state('input_boolean.julia_nightshift', 'off') else
                    nightshift_time %}

                    {% set mode = states('input_select.vacuum_schedule_mode') |
                    replace('_', ' ') | title %}

                    {% set has_regular =
                    is_state('input_boolean.vacuum_schedule_monday', 'on') and
                    is_state('input_boolean.vacuum_schedule_daily', 'on') %}

                    {% set has_zone =
                    is_state('automation.vacuum_zone_schedule_monday', 'on') and
                    is_state('input_boolean.vacuum_zone_schedule_enabled', 'on')
                    %}

                    {% if has_regular and not has_zone %}
                      {% set rooms = [] %}
                      {% if is_state('input_boolean.schedule_room_living_room', 'on') %}{% set rooms = rooms + ['Living'] %}{% endif %}
                      {% if is_state('input_boolean.schedule_room_kitchen', 'on') %}{% set rooms = rooms + ['Kitchen'] %}{% endif %}
                      {% if is_state('input_boolean.schedule_room_entryway', 'on') %}{% set rooms = rooms + ['Entry'] %}{% endif %}
                      🕐 {{ time }} • {{ mode }}
                      🏠 {{ rooms | join(', ') if rooms else 'All rooms' }}
                    {% elif has_zone %}
                      {% set zone_desc = state_attr('automation.vacuum_zone_schedule_monday', 'description') %}
                      {% if zone_desc %}
                        {% set zone_rooms = zone_desc | regex_replace('.*Clean ', '') | regex_replace(' on.*', '') | title %}
                        🕐 {{ time }} • {{ mode }}
                        🎯 {{ zone_rooms }}
                      {% else %}
                        🕐 {{ time }} • {{ mode }}
                        🎯 Zone cleaning
                      {% endif %}
                    {% else %}
                      No cleaning scheduled
                    {% endif %}
                  icon: >
                    {% set has_any =
                    (is_state('input_boolean.vacuum_schedule_monday', 'on') and
                    is_state('input_boolean.vacuum_schedule_daily', 'on')) or
                    (is_state('automation.vacuum_zone_schedule_monday', 'on')
                    and is_state('input_boolean.vacuum_zone_schedule_enabled',
                    'on')) %} {{ 'mdi:calendar-check' if has_any else
                    'mdi:calendar-blank' }}
