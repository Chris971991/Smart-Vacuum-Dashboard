  vacuum_last_cleaned_guest_bedroom:
    name: "Vacuum - Last Cleaned Guest Bedroom"
    has_date: true
    has_time: true
    icon: mdi:bed

  vacuum_last_cleaned_bathroom:
    name: "Vacuum - Last Cleaned Bathroom"
    has_date: true
    has_time: true
    icon: mdi:shower

  vacuum_last_cleaned_ensuite:
    name: "Vacuum - Last Cleaned Ensuite"
    has_date: true
    has_time: true
    icon: mdi:shower-head

  vacuum_last_cleaned_media_room:
    name: "Vacuum - Last Cleaned Media Room"
    has_date: true
