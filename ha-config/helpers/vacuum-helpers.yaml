# Vacuum Dashboard - Home Assistant Helpers
# ==========================================
# Copy this content into your Home Assistant configuration
# or include it via: input_boolean: !include vacuum-helpers.yaml
#
# These helpers are used by the Vacuum Dashboard custom card
# for enhanced features like room cleaning history, schedule
# overrides, and consumable tracking.

# ==========================================
# SCHEDULE OVERRIDE HELPERS
# ==========================================

input_boolean:
  # Skip the next scheduled vacuum clean
  vacuum_skip_next_clean:
    name: "Vacuum - Skip Next Scheduled Clean"
    icon: mdi:calendar-remove

  # Enable quiet hours (no cleaning during specified times)
  vacuum_quiet_hours_enabled:
    name: "Vacuum - Quiet Hours Enabled"
    icon: mdi:volume-off

  # Zone cleaning schedule enabled
  vacuum_zone_schedule_enabled:
    name: "Vacuum - Zone Cleaning Schedule Enabled"
    icon: mdi:calendar-check

  # Daily cleaning enabled
  vacuum_schedule_daily:
    name: "Vacuum - Daily Cleaning Enabled"
    icon: mdi:calendar-today

  # Day-of-week schedule toggles
  vacuum_schedule_monday:
    name: "Vacuum - Schedule Monday"
    icon: mdi:calendar
  vacuum_schedule_tuesday:
    name: "Vacuum - Schedule Tuesday"
    icon: mdi:calendar
  vacuum_schedule_wednesday:
    name: "Vacuum - Schedule Wednesday"
    icon: mdi:calendar
  vacuum_schedule_thursday:
    name: "Vacuum - Schedule Thursday"
    icon: mdi:calendar
  vacuum_schedule_friday:
    name: "Vacuum - Schedule Friday"
    icon: mdi:calendar
  vacuum_schedule_saturday:
    name: "Vacuum - Schedule Saturday"
    icon: mdi:calendar
  vacuum_schedule_sunday:
    name: "Vacuum - Schedule Sunday"
    icon: mdi:calendar

