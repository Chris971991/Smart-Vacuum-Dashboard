# ==========================================
# SELECT HELPERS
# ==========================================

input_select:
  # Fan speed selector
  alfonso_fan_speed_selector:
    name: "Alfonso - Fan Speed"
    options:
      - Quiet
      - Normal
      - Max
      - Max+
    initial: Normal
    icon: mdi:fan

  # Cleaning mode for scheduled cleaning
  vacuum_schedule_mode:
    name: "Vacuum - Schedule Mode"
    options:
      - Vacuum Only
      - Mop Only
      - Vacuum & Mop
    initial: Vacuum & Mop
    icon: mdi:robot-vacuum

# ==========================================
# SPECIAL TOGGLES
# ==========================================

  # Julia's night shift toggle (affects schedule time)
  julia_nightshift:
    name: "Julia Currently on Night Shift"
    icon: mdi:briefcase-clock
