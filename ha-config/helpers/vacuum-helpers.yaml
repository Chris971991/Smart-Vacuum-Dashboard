# ==========================================
# DATETIME HELPERS
# ==========================================

input_datetime:
  # Schedule times
  vacuum_schedule_time:
    name: "Vacuum - Schedule Time (Normal)"
    has_time: true
    has_date: false
    icon: mdi:clock

  vacuum_schedule_time_nightshift:
    name: "Vacuum - Schedule Time (Night Shift)"
    has_time: true
    has_date: false
    icon: mdi:clock-outline

  # Quiet hours
  vacuum_quiet_start:
    name: "Vacuum - Quiet Hours Start"
    has_time: true
    has_date: false
    icon: mdi:moon-waning-crescent

  vacuum_quiet_end:
    name: "Vacuum - Quiet Hours End"
    has_time: true
    has_date: false
    icon: mdi:weather-sunny

  # Consumable replacement tracking
  vacuum_filter_last_replaced:
