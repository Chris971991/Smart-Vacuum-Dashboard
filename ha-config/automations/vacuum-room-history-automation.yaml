# Vacuum Room History Automation
# ===============================
# Add this via Home Assistant UI: Settings > Automations > Create Automation > Edit in YAML
# Copy the content between the --- markers for each automation

# -----------------------------------
# AUTOMATION 1: Update Room Cleaning History
# -----------------------------------
alias: "Vacuum - Update Room Cleaning History"
description: "Updates the last cleaned timestamp for rooms when vacuum completes cleaning"
mode: single
triggers:
  - trigger: state
    entity_id: vacuum.alfonso
    to: "docked"
    from:
      - "cleaning"
      - "returning"
  - trigger: state
    entity_id: vacuum.alfonso
    to: "returning"
    from: "cleaning"
conditions:
  - condition: template
    value_template: >
      {{ trigger.from_state.state == 'cleaning' or
         (trigger.to_state.state == 'docked' and trigger.from_state.state == 'returning') }}
actions:
  # Living Room
  - if:
      - condition: state
        entity_id: input_boolean.clean_room_living_room
        state: "on"
    then:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.vacuum_last_cleaned_living_room
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
