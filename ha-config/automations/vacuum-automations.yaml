- alias: Julia Nightshift Started
  id: '1755823085931'
  description: Detects when Julia's nightshift week begins from calendar and adjusts
    vacuum schedule to evening
  triggers:
  - trigger: calendar
    entity_id: calendar.juliacg109_gmail_com
    event: start
    offset: 0:0:0
  conditions:
  - condition: template
    value_template: '{{ ''nightshift'' in trigger.calendar_event.summary|lower }}'
  actions:
  - action: input_boolean.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.julia_nightshift
  - action: notify.family_phones
    metadata: {}
    data:
      title: " Julia's Nightshift Week Started"
      message: Vacuum will now run at evening time as to not disturb Juia sleeping.

