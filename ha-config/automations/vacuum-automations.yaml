      - input_boolean.clean_room_bathroom
      - input_boolean.clean_room_ensuite
      - input_boolean.clean_room_media_room
      - input_boolean.clean_room_office
      - input_boolean.clean_room_beauty_room
      - input_boolean.clean_room_entryway
      - input_boolean.clean_room_hallway
      - input_boolean.clean_room_laundry
