- alias: Vacuum - Scheduled Cleaning
  id: '1751085400556'
  description: Run vacuum at scheduled time on selected days
  triggers:
  - trigger: template
    value_template: >-
      {% set now_time = now().strftime('%H:%M:%S') %}
      {% if is_state('input_boolean.julia_nightshift', 'on') %}
        {{ now_time == states('input_datetime.vacuum_schedule_time_nightshift') }}
      {% else %}
        {{ now_time == states('input_datetime.vacuum_schedule_time') }}
      {% endif %}
  conditions:
  - condition: state
    entity_id: input_boolean.vacuum_schedule_daily
    state: 'on'
  - condition: template
    value_template: >-
      {% set today = now().strftime('%A').lower() %}
      {{ is_state('input_boolean.vacuum_schedule_' ~ today, 'on') }}
  - condition: state
    entity_id: vacuum.alfonso
    state: docked
  actions:
  - data:
      scene_id: vacuum_manual_rooms_backup
      snapshot_entities:
      - input_boolean.clean_room_living_room
      - input_boolean.clean_room_kitchen
      - input_boolean.clean_room_master_bedroom
      - input_boolean.clean_room_guest_bedroom
      - input_boolean.clean_room_bathroom
      - input_boolean.clean_room_ensuite
      - input_boolean.clean_room_media_room
      - input_boolean.clean_room_office
      - input_boolean.clean_room_beauty_room
      - input_boolean.clean_room_entryway
      - input_boolean.clean_room_hallway
      - input_boolean.clean_room_laundry
      - input_boolean.clean_room_master_robe
    action: scene.create
  - target:
      entity_id: select.alfonso_work_mode
    data:
      option: '{{ states(''input_select.vacuum_schedule_mode'') }}'
    action: select.select_option
  - delay:
      seconds: 2
  - target:
      entity_id:
      - input_boolean.clean_room_living_room
      - input_boolean.clean_room_kitchen
      - input_boolean.clean_room_master_bedroom
      - input_boolean.clean_room_guest_bedroom
      - input_boolean.clean_room_bathroom
      - input_boolean.clean_room_ensuite
      - input_boolean.clean_room_media_room
      - input_boolean.clean_room_office
      - input_boolean.clean_room_beauty_room
      - input_boolean.clean_room_entryway
      - input_boolean.clean_room_hallway
      - input_boolean.clean_room_laundry
      - input_boolean.clean_room_master_robe
    action: input_boolean.turn_off
    data: {}
  - target:
      entity_id: >-
        {% set rooms = [] %}
        {% if is_state('input_boolean.schedule_room_living_room', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_living_room'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_kitchen', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_kitchen'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_master_bedroom', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_master_bedroom'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_guest_bedroom', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_guest_bedroom'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_bathroom', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_bathroom'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_ensuite', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_ensuite'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_media_room', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_media_room'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_office', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_office'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_beauty_room', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_beauty_room'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_entryway', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_entryway'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_hallway', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_hallway'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_laundry', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_laundry'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_master_robe', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_master_robe'] %}{% endif %}
        {{ rooms }}
    action: input_boolean.turn_on
    data: {}
  - action: script.clean_selected_rooms
    data: {}
  - delay:
      seconds: 5
  - target:
      entity_id: scene.vacuum_manual_rooms_backup
    action: scene.turn_on
    data: {}
  - data:
      title: "\U0001F916 Vacuum Started"
      message: >-
        Alfonso has started scheduled cleaning in {{ states('input_select.vacuum_schedule_mode')
        | replace('_', ' ') | title }} mode
        {% if is_state('input_boolean.julia_nightshift', 'on') %}
        (Evening schedule - Julia on night shift)
        {% else %}
        (Morning schedule)
        {% endif %}
    action: notify.family_phones
  mode: single

