        {% if is_state('input_boolean.schedule_room_hallway', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_hallway'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_laundry', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_laundry'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_master_robe', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_master_robe'] %}{% endif %}
        {{ rooms }}
    action: input_boolean.turn_on
  mode: single
  description: ''
