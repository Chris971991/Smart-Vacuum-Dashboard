        {% if is_state('input_boolean.schedule_room_guest_bedroom', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_guest_bedroom'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_bathroom', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_bathroom'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_ensuite', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_ensuite'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_media_room', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_media_room'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_office', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_office'] %}{% endif %}
        {% if is_state('input_boolean.schedule_room_beauty_room', 'on') %}{% set rooms = rooms + ['input_boolean.clean_room_beauty_room'] %}{% endif %}
